name: Sync Google Places

on:
  schedule:
    - cron: "0 3 1 * *" # 1st of every month, 03:00 UTC (dev)
  workflow_dispatch:
    inputs:
      target:
        description: "Environment to sync"
        type: choice
        options: [dev, prod]
        default: dev

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: pnpm install --frozen-lockfile
      - run: node scripts/sync-google-places.mjs
        env:
          # Scheduled runs and manual "dev" dispatch use the dev secrets;
          # a manual "prod" dispatch uses the prod secrets. Google key is shared.
          SUPABASE_URL: ${{ github.event.inputs.target == 'prod' && secrets.PROD_SUPABASE_URL || secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ github.event.inputs.target == 'prod' && secrets.PROD_SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
